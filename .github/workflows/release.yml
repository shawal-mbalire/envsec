name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.gz

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Get build date
        id: date
        shell: bash
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}
        env:
          BUILD_DATE: ${{ steps.date.outputs.date }}
          GIT_SHA: ${{ github.sha }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}
        env:
          BUILD_DATE: ${{ steps.date.outputs.date }}
          GIT_SHA: ${{ github.sha }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../envsec-${{ github.ref_name }}-${{ matrix.target }}.tar.gz envsec
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../envsec-${{ github.ref_name }}-${{ matrix.target }}.zip envsec.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: envsec-${{ matrix.target }}
          path: envsec-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG="${GITHUB_REF#refs/tags/}"
          cat <<EOF > release_notes.md
          ## envsec ${TAG} (${DATE})

          ### Installation

          **One-liner (Linux/macOS):**
          \`\`\`bash
          curl -sSf https://raw.githubusercontent.com/shawal-mbalire/envsec/main/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          Download the \`.zip\` asset for your architecture and add to PATH.

          ### Checksums
          See assets below for platform-specific binaries.

          ### Changelog
          See [CHANGELOG.md](https://github.com/shawal-mbalire/envsec/blob/main/CHANGELOG.md) for details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*
